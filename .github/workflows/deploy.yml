name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            ssh-keyscan github.com >> ~/.ssh/known_hosts
            if [ ! -d "${{ secrets.PROJECT_PATH }}" ]; then
              GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed22519_github" git clone git@github.com:${{ github.repository }}.git ${{ secrets.PROJECT_PATH }}
            fi
            cd ${{ secrets.PROJECT_PATH }}
            GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed22519_github" git pull origin main
            docker-compose down
            docker-compose up -d --build
